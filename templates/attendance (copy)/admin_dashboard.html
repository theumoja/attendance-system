{% extends 'attendance/base.html' %}
{% block content %}
<style>
    .dashboard-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 2rem;
    }
    .dashboard-nav .nav-link {
        background: var(--surface);
        color: var(--text-main);
        padding: 0.9rem 1.5rem;
        border-radius: var(--radius-sm);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        transition: var(--transition);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex: 1 1 auto;
        box-shadow: var(--shadow-sm);
    }
    .dashboard-nav .nav-link:hover {
        background: var(--primary-light);
        color: var(--primary);
        border-color: var(--primary);
        transform: translateY(-2px);
        box-shadow: var(--shadow);
    }
    .dashboard-nav .nav-link i { font-size: 1.2rem; }

    .chart-container {
        position: relative;
        height: 280px;
        width: 100%;
        margin-top: 0.5rem;
    }
    .card-chart {
        padding: 1.5rem;
    }
</style>

<h2><i class="fas fa-chart-pie"></i> System Management Dashboard</h2>

<!-- Summary Stats (static placeholders – replace with real data if available) -->
<div class="grid-3" style="margin-bottom: 2.5rem;">
    <div class="stat-card">
        <div class="icon"><i class="fas fa-book-open"></i></div>
        <div class="info">
            <h4>Total Courses</h4>
            <div class="number">24</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="icon"><i class="fas fa-chalkboard-teacher"></i></div>
        <div class="info">
            <h4>Teachers</h4>
            <div class="number">18</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="icon"><i class="fas fa-users"></i></div>
        <div class="info">
            <h4>Students</h4>
            <div class="number">342</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="icon"><i class="fas fa-percent"></i></div>
        <div class="info">
            <h4>Attendance Rate</h4>
            <div class="number">87%</div>
        </div>
    </div>
</div>

<!-- Navigation Cards -->
<div class="dashboard-nav">
    <a href="{% url 'attendance:bulk_upload_courses' %}" class="nav-link"><i class="fas fa-upload"></i> Upload Courses</a>
    <a href="{% url 'attendance:bulk_upload_teachers' %}" class="nav-link"><i class="fas fa-user-plus"></i> Upload Teachers</a>
    <a href="{% url 'attendance:bulk_upload_students' %}" class="nav-link"><i class="fas fa-user-graduate"></i> Upload Students</a>
    <a href="{% url 'attendance:upload_timetable' %}" class="nav-link"><i class="fas fa-calendar-plus"></i> Manage Timetable</a>
</div>

<!-- Charts -->
<div class="grid-2">
    <div class="card card-chart">
        <h3><i class="fas fa-dot-circle" style="color:var(--success);"></i> Attendance Status Distribution</h3>
        <div class="chart-container">
            <canvas id="pieChartTerminal"></canvas>
        </div>
    </div>
    <div class="card card-chart">
        <h3><i class="fas fa-chart-bar" style="color:var(--secondary);"></i> Course Unit Compliance</h3>
        <div class="chart-container">
            <canvas id="barChartTerminal"></canvas>
        </div>
    </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    fetch('/analytics/global/json/')
        .then(response => response.json())
        .then(data => {
            new Chart(document.getElementById('pieChartTerminal'), {
                type: 'pie',
                data: {
                    labels: ['Present', 'Absent'],
                    datasets: [{
                        data: [data.pie.present, data.pie.absent],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { size: 13 } } }
                    },
                    cutout: '70%'
                }
            });

            new Chart(document.getElementById('barChartTerminal'), {
                type: 'bar',
                data: {
                    labels: data.bar.labels,
                    datasets: [{
                        label: 'Verification Integrity Rate (%)',
                        data: data.bar.rates,
                        backgroundColor: '#2c6e6b',
                        borderRadius: 6,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { min: 0, max: 100, grid: { color: '#f1f5f9' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        })
        .catch(() => console.warn('Analytics data unavailable'));
});
</script>
{% endblock %}
