{% extends 'attendance/base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh; padding: 1rem;">
    <div class="card" style="max-width: 500px; width: 100%; text-align: center; padding: 3rem 2rem; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--text-muted);"></div>
        
        <div style="font-size: 4rem; color: var(--text-muted); margin-bottom: 1.5rem;">
            <i class="fas fa-ban"></i>
        </div>
        
        <h1 style="font-size: 2rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 0.75rem;">400 - Bad Request</h1>
        
        <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem;">
            The system could not parse the execution call due to malformed string syntax or corrupted incoming payload tracking data.
        </p>
        
        <a href="{% url 'attendance:home' %}" class="btn btn-outline" style="width: 100%; justify-content: center;">
            <i class="fas fa-home"></i> Return Home
        </a>
    </div>
</div>
{% endblock %}
