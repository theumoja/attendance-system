{% extends 'attendance/base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh; padding: 1rem;">
    <div class="card" style="max-width: 500px; width: 100%; text-align: center; padding: 3rem 2rem; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--warning);"></div>
        
        <div style="font-size: 4rem; color: var(--warning); margin-bottom: 1.5rem;">
            <i class="fas fa-shield-alt"></i>
        </div>
        
        <h1 style="font-size: 2rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 0.75rem;">403 - Access Denied</h1>
        
        <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem;">
            Clearance verification failed. Your profile does not possess the institutional role authorization required to view this interface layer.
        </p>
        
        <a href="{% url 'attendance:home' %}" class="btn" style="width: 100%; justify-content: center;">
            <i class="fas fa-arrow-left"></i> Go Back to Hub
        </a>
    </div>
</div>
{% endblock %}
