{% extends 'attendance/base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh; padding: 1rem;">
    <div class="card" style="max-width: 500px; width: 100%; text-align: center; padding: 3rem 2rem; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--danger);"></div>
        
        <div style="font-size: 4rem; color: var(--danger); margin-bottom: 1.5rem;">
            <i class="fas fa-server"></i>
        </div>
        
        <h1 style="font-size: 2rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 0.75rem;">500 - System Exception</h1>
        
        <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem;">
            An unhandled runtime error occurred inside the core execution loop. The telemetry system has automatically captured this stack log.
        </p>
        
        <a href="{% url 'attendance:home' %}" class="btn" style="background: linear-gradient(135deg, var(--danger), #b91c1c); width: 100%; justify-content: center;">
            <i class="fas fa-sync"></i> Force Home Reset
        </a>
    </div>
</div>
{% endblock %}
