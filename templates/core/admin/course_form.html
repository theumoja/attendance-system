{% extends "core/base.html" %}
{% block content %}
<h2>{% if object %}Edit{% else %}Add{% endif %} Course</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'core:admin_courses' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
