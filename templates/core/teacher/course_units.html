{% extends "core/base.html" %}
{% block content %}
<h2>{{ course.name }} Units</h2>
<div class="list-group">
    {% for unit in units %}
        <div class="list-group-item d-flex justify-content-between align-items-center">
            <span>{{ unit.code }} - {{ unit.name }}</span>
            <div>
                <a href="{% url 'core:teacher_mark_attendance' unit.id %}" class="btn btn-sm btn-primary">Mark Attendance</a>
                <a href="{% url 'core:teacher_attendance' unit.id %}" class="btn btn-sm btn-outline-secondary">View Records</a>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
