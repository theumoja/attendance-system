{% extends 'attendance/base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 4rem auto; padding: 2rem; background: #ffffff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h2 style="margin-bottom: 0.5rem; color: #1e293b;">Reset Password</h2>
    <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem;">
        Enter your email address below, and we'll send instructions to reset your password if your account exists.
    </p>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            {{ form.email.errors }}
            <label for="id_email" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email Address:</label>
            <input type="email" name="email" id="id_email" required autocomplete="email" 
                   style="width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box;">
        </div>
        <button type="submit" style="width:100%; padding: 0.75rem; background: #2c6e6b; color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer;">
            Send Reset Link
        </button>
    </form>
</div>
{% endblock %}
