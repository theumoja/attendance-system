{% extends 'attendance/base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 4rem auto; padding: 2rem; background: #ffffff; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h2 style="color: #10b981; margin-bottom: 1rem;">Password Reset Complete</h2>
    <p style="color: #64748b; margin-bottom: 1.5rem;">
        Your password has been successfully updated. You may now log in with your new credentials.
    </p>
    <a href="{% url 'attendance:home' %}" style="display: block; padding: 0.75rem; background: #2c6e6b; color: white; border: none; border-radius: 4px; font-weight: 600; text-decoration: none;">
        Go to Login
    </a>
</div>
{% endblock %}
