{% extends 'attendance/base.html' %}
{% block content %}
<div style="max-width: 420px; margin: 3rem auto;">
    <div class="card" style="padding: 2.5rem; text-align: center;">
        <div style="margin-bottom: 2rem;">
            <i class="fas fa-university" style="font-size: 3.5rem; color: var(--primary);"></i>
            <h2 style="margin-top: 0.5rem; margin-bottom: 0.25rem; font-weight: 700;">Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Sign in to manage your academic duties</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            {% if form.errors %}
                <div class="alert alert-danger" style="margin-bottom: 1.5rem;">
                    <i class="fas fa-exclamation-triangle"></i> Invalid credentials. Please try again.
                </div>
            {% endif %}

            <div style="margin-bottom: 1.25rem; text-align: left;">
                <label for="id_username"><i class="fas fa-user"></i> Username / Reg Number</label>
                <input type="text" name="username" autofocus required id="id_username" placeholder="Enter your username or registration number">
            </div>

            <div style="margin-bottom: 1.75rem; text-align: left;">
                <label for="id_password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" required id="id_password" placeholder="••••••••">
            </div>

            <button type="submit" class="btn" style="width:100%; padding: 0.8rem; font-size:1rem; border-radius:50px;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        <p style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
            <i class="fas fa-lock"></i> Secure access for authorized personnel only.
        </p>
    </div>
</div>
{% endblock %}
